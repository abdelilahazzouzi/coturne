version: "2"
type: backend
tech_stack:
  - TypeScript
  - TanStack Start
  - Cloudflare Pages
  - Supabase
features:
  - name: Sitemap API
    description: Generates the sitemap.xml dynamically
    files:
      - src/routes/sitemap[.]xml.ts
    endpoints:
      - method: GET
        path: /sitemap.xml
        description: List all main page URLs
        auth_required: false
        response_schema:
          "200": XML
  - name: Email Queue Process API
    description: Processes the queued transactional and authentication emails from Supabase pgmq
    files:
      - src/routes/lovable/email/queue/process.ts
    endpoints:
      - method: POST
        path: /lovable/email/queue/process
        description: Process queued emails in batches
        auth_required: true
        request_schema:
          headers:
            Authorization: string
        response_schema:
          "200": object
          "401": Unauthorized
          "403": Forbidden
          "500": Server configuration error
known_limitations: []
